name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Sheets URLs
        # Keeps sheet URLs out of git — inject them from repository secrets at deploy time.
        # Add these in: repo Settings → Secrets and variables → Actions → New repository secret
        #   RW_SHEET_URL  — full Google Sheets URL for HMSI RW data
        #   BW_SHEET_URL  — full Google Sheets URL for HMSI BW data
        # Both sheets must be shared: File → Share → "Anyone with the link → Viewer"
        run: |
          sed -i \
            -e "s|RW_SHEET_URL:          ''|RW_SHEET_URL: '${{ secrets.RW_SHEET_URL }}'|g" \
            -e "s|BW_SHEET_URL:          ''|BW_SHEET_URL: '${{ secrets.BW_SHEET_URL }}'|g" \
            HMSI_RW_Dashboard_v4.02.html

      - name: Prepare site
        run: |
          mkdir -p _site
          cp HMSI_RW_Dashboard_v4.02.html _site/index.html
          cp _site/index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
