name: Deploy Royal Enfield LDR Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Sheets URL
        # Keeps the sheet URL out of git — injected from a repository secret at deploy time.
        # Add this in: repo Settings → Secrets and variables → Actions → New repository secret
        #   RE_SHEET_URL  — full Google Sheets URL for Royal Enfield LDR data
        # Sheet must be shared: File → Share → "Anyone with the link → Viewer"
        run: |
          sed -i \
            -e "s|LDR_SHEET_URL:         ''|LDR_SHEET_URL: '${{ secrets.RE_SHEET_URL }}'|g" \
            RE_LDR_Dashboard_v1.0.html

      - name: Prepare site
        run: |
          mkdir -p _site
          cp RE_LDR_Dashboard_v1.0.html _site/index.html
          cp _site/index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
